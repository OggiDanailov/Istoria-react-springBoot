# H2 Database (Local)
spring.datasource.url=jdbc:h2:file:./data/quizdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=oggi
spring.datasource.password=

# H2 Dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Hibernate auto-update for dev
spring.jpa.hibernate.ddl-auto=update

# Flyway OFF for local
spring.flyway.enabled=false

JWT_SECRET=aVeryLongSecretKeyThatIsAtLeast64BytesLongForHS512AlgorithmSecurityPurposesOnlyForDevelopment1234567890
JWT_EXPIRATION=86400000